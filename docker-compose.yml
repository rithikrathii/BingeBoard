version: "3.8"

services:
  movie-catalogue:
    build: ./movie-catalogue-service
    ports:
      - "8001:8001"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=sample_mflix
      - PORT=8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3